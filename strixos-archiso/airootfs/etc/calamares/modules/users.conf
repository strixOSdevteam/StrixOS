defaultGroups:
    - name: users
      state: must-exist
    - name: lp
      state: must-exist
    - name: video
      state: must-exist
    - name: network
      state: must-exist
    - name: storage
      state: must-exist
    - name: wheel
      state: must-exist
    - name: audio
      state: must-exist
autologinGroup: autologin
doAutologin: false
sudoersGroup: wheel
setRootPassword: true
doReusePassword: false
passwordRequirements:
    minLength: 6
